<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }
  #header { background: #16213e; padding: 16px 24px; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 12px; }
  #header h1 { font-size: 18px; font-weight: 600; flex: 1; }
  #new-session-btn { padding: 6px 14px; background: #2a2a4e; color: #ccc; border: 1px solid #0f3460; border-radius: 6px; cursor: pointer; font-size: 12px; }
  #new-session-btn:hover { background: #3a3a6e; }
  #messages { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 12px; }
  .message { padding: 10px 14px; border-radius: 8px; max-width: 80%; line-height: 1.5; white-space: pre-wrap; }
  .message.user { background: #0f3460; align-self: flex-end; }
  .message.pi { background: #16213e; align-self: flex-start; border: 1px solid #0f3460; }
  .message.error { background: #3d0000; align-self: flex-start; border: 1px solid #6b0000; color: #ff6b6b; }
  /* Streaming AI bubble: blinking cursor to indicate "still writing" */
  .message.pi.streaming::after {
    content: ' ▌';
    animation: blink 1s step-end infinite;
  }
  .message.pi.streaming.done::after {
    content: none;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  /* Thinking / reasoning text (gray, italic) */
  .thinking-block { color: #888; font-style: italic; font-size: 13px; margin-bottom: 8px; border-left: 2px solid #444; padding-left: 10px; }
  /* Tool call block */
  .tool-block { background: #1e2a3a; border: 1px solid #2a4a6a; border-radius: 6px; padding: 6px 10px; margin-bottom: 8px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .tool-block .tool-icon { font-size: 14px; }
  .tool-block .tool-name { color: #4a90d9; font-weight: 600; }
  .tool-block .tool-input { color: #aaa; font-family: monospace; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }
  .tool-block .tool-done { color: #6b6; margin-left: auto; font-size: 12px; }
  #input-area { display: flex; gap: 8px; padding: 12px 24px; background: #16213e; border-top: 1px solid #0f3460; }
  #input { flex: 1; padding: 10px 14px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; }
  #input:focus { border-color: #4a90d9; }
  #send-btn { padding: 10px 20px; background: #4a90d9; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
  #send-btn:hover { background: #357abd; }
  #send-btn:disabled { background: #555; cursor: not-allowed; }
  .skill-btn { padding: 8px 14px; background: transparent; color: #888; border: 1px solid #444; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; }
  .skill-btn:hover { color: #e0e0e0; border-color: #4a90d9; }
  .skill-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #status { font-size: 12px; padding: 4px 24px; color: #888; }
  @media (max-width: 600px) {
    .message { max-width: 95%; }
    #messages { padding: 12px; }
    #input-area { padding: 8px 12px; }
    #header { padding: 12px; }
  }
</style>
</head>
<body>
<div id="header">
  <h1>Loop Chat</h1>
  <button id="new-session-btn" onclick="newSession()">New Session</button>
</div>
<div id="messages"></div>
<div id="input-area">
  <button class="skill-btn" onclick="sendSkill('to-prd')" title="生成 PRD">📋 PRD</button>
  <button class="skill-btn" onclick="sendSkill('to-issues')" title="拆成 Issues">📝 Issues</button>
  <input type="text" id="input" placeholder="Type your message..." autofocus>
  <button id="send-btn" onclick="send()">Send</button>
</div>
<div id="status">Ready</div>
<script>
  const input = document.getElementById('input');
  const messages = document.getElementById('messages');
  const sendBtn = document.getElementById('send-btn');
  const skillBtns = document.querySelectorAll('.skill-btn');
  const status = document.getElementById('status');

  let loading = false;

  // Load saved history on page load
  let history = [];
  try {
    history = JSON.parse(localStorage.getItem('loop-chat-history') || '[]');
    for (const m of history) addMessage(m.text, m.cls, false);
  } catch { history = []; }

  // Send on Enter (only when not loading)
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!loading) send();
    }
  });

  async function sendSkill(name) {
    if (loading) return;
    sendMessage('/skill:' + name);
  }

  async function send() {
    if (loading) return;
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    sendMessage(text);
  }

  let toolCounter = 0;

  /**
   * Send a message and stream the AI response via SSE.
   * Creates a streaming bubble that shows thinking (gray), tool calls
   * (styled blocks), and text as they arrive. Blinking cursor while active.
   */
  async function sendMessage(text) {
    addMessage(text, 'user');
    setLoading(true);
    toolCounter = 0;

    // Create AI bubble in "thinking" state
    const bubble = document.createElement('div');
    bubble.className = 'message pi streaming';
    bubble.textContent = 'Thinking...';
    messages.appendChild(bubble);
    messages.scrollTop = messages.scrollHeight;

    let fullText = '';
    let firstUpdate = true;
    // Track tool call DOM elements by name+input signature (for dedup)
    const toolEls = new Map();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      if (!res.ok) {
        bubble.remove();
        let errorMsg = 'Request failed: ' + res.statusText;
        try { const err = await res.json(); errorMsg = err.error || errorMsg; } catch { /* use default */ }
        addMessage(errorMsg, 'error');
        setLoading(false);
        return;
      }

      // Read SSE stream
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));

            if (data.type === 'text') {
              // Normal text: clear initial placeholder, show accumulated text
              if (firstUpdate) { firstUpdate = false; clearBubble(bubble); }
              renderBubble(bubble, data.text, toolEls);
              fullText = data.text;
            } else if (data.type === 'thinking') {
              // Thinking block: show in gray at top
              upsertBlock(bubble, 'thinking-' + hash(data.thinking || ''), 'thinking-block', data.thinking);
            } else if (data.type === 'tool_call') {
              // Tool call: show styled block
              toolCounter++;
              const key = data.toolName + '-' + (data.toolInput || '');
              const el = upsertBlock(bubble, 'tool-' + toolCounter, 'tool-block',
                '<span class="tool-icon">🔧</span>' +
                '<span class="tool-name">' + esc(data.toolName) + '</span>' +
                '<span class="tool-input">' + esc(truncate(data.toolInput || '', 200)) + '</span>'
              );
              toolEls.set(key, el);
            } else if (data.type === 'tool_result') {
              // Mark latest tool block as done
              const lastTool = bubble.querySelector('.tool-block:not(.tool-done)');
              if (lastTool) {
                const done = document.createElement('span');
                done.className = 'tool-done'; done.textContent = '✓';
                lastTool.appendChild(done);
                lastTool.classList.add('tool-done');
              }
            } else if (data.type === 'done') {
              fullText = data.text || fullText;
            } else if (data.type === 'error') {
              bubble.remove();
              addMessage(data.error, 'error');
              setLoading(false);
              return;
            }
          } catch { /* skip invalid JSON */ }
        }
      }

      // Finalize: remove streaming cursor
      renderBubble(bubble, fullText, toolEls);
      bubble.classList.add('done');
      // Save text-only to history
      const textOnly = bubble.querySelector('.bubble-text');
      const finalText = textOnly ? textOnly.textContent : (fullText || bubble.textContent);
      history.push({ text: finalText, cls: 'pi' });
      localStorage.setItem('loop-chat-history', JSON.stringify(history));
    } catch (err) {
      if (bubble.parentNode) {
        bubble.remove();
        addMessage('Network error: ' + err.message, 'error');
      }
    } finally {
      setLoading(false);
    }
  }

  function clearBubble(bubble) {
    bubble.innerHTML = '';
  }

  function renderBubble(bubble, text, toolEls) {
    // Rebuild: keep tool blocks, update text at bottom
    const existingTools = bubble.querySelectorAll('.tool-block');
    const existingThinking = bubble.querySelectorAll('.thinking-block');
    bubble.innerHTML = '';
    // Re-append thinking blocks
    for (const el of existingThinking) bubble.appendChild(el.cloneNode(true));
    // Re-append tool blocks
    for (const el of existingTools) bubble.appendChild(el.cloneNode(true));
    // Text at bottom
    if (text) {
      const textEl = document.createElement('div');
      textEl.className = 'bubble-text';
      textEl.textContent = text;
      bubble.appendChild(textEl);
    }
    messages.scrollTop = messages.scrollHeight;
  }

  function upsertBlock(bubble, id, className, html) {
    let el = document.getElementById('block-' + id);
    if (!el) {
      el = document.createElement('div');
      el.id = 'block-' + id;
      el.className = className;
      el.innerHTML = html;
      bubble.appendChild(el);
    } else {
      el.innerHTML = html;
    }
    messages.scrollTop = messages.scrollHeight;
    return el;
  }

  function hash(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) | 0; } return h.toString(36); }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function truncate(s, n) { return s.length > n ? s.slice(0, n) + '...' : s; }

  async function newSession() {
    if (loading) return;
    setLoading(true);
    status.textContent = 'Creating new session...';

    try {
      const res = await fetch('/new-session', { method: 'POST' });
      const data = await res.json();
      if (data.success) {
        messages.innerHTML = '';
        history = [];
        localStorage.removeItem('loop-chat-history');
        addMessage('Session reset.', 'pi', false);
      } else {
        addMessage('Failed to create new session', 'error');
      }
    } catch (err) {
      addMessage('Error creating new session: ' + err.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  function addMessage(text, cls, save = true) {
    const div = document.createElement('div');
    div.className = 'message ' + cls;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    if (save) {
      history.push({ text, cls });
      localStorage.setItem('loop-chat-history', JSON.stringify(history));
    }
  }

  function setLoading(v) {
    loading = v;
    sendBtn.disabled = v;
    sendBtn.textContent = v ? 'Sending...' : 'Send';
    skillBtns.forEach(b => b.disabled = v);
    status.textContent = v ? 'Waiting for pi...' : 'Ready';
  }
</script>
</body>
</html>
